<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reply – ClickWise</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 560px;
        }
        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4ade80;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #fff;
        }
        .original {
            background: #111;
            border-left: 3px solid #4ade80;
            border-radius: 0 6px 6px 0;
            padding: 0.875rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: #aaa;
            line-height: 1.6;
        }
        .original .meta {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .original .body {
            color: #ccc;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        textarea {
            width: 100%;
            min-height: 160px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e5e5e5;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 0.75rem 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }
        textarea:focus { border-color: #4ade80; }
        button {
            margin-top: 1rem;
            width: 100%;
            background: #4ade80;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }
        .msg.success { background: #052e16; border: 1px solid #4ade80; color: #4ade80; }
        .msg.error   { background: #2d0707; border: 1px solid #f87171; color: #f87171; }
        .loading { color: #666; font-size: 0.9rem; text-align: center; padding: 2rem 0; }
    </style>
</head>
<body>
    <div class="card">
        <span class="logo">ClickWise</span>
        <div id="loading" class="loading">Loading...</div>
        <div id="content" style="display:none;">
            <h1>Reply to <span id="senderName"></span></h1>
            <div class="original">
                <div class="meta" id="metaLine"></div>
                <div class="body" id="originalMessage"></div>
            </div>
            <label for="replyText">Your reply</label>
            <textarea id="replyText" placeholder="Type your reply here..."></textarea>
            <button id="sendBtn" onclick="sendReply()">Send Reply</button>
            <div class="msg success" id="successMsg">Reply sent successfully from contact@clickwise.us.</div>
            <div class="msg error" id="errorMsg"></div>
        </div>
        <div id="errorPage" style="display:none;color:#f87171;font-size:0.9rem;">
            This reply link is invalid or has expired.
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const token = params.get('token');

        async function init() {
            if (!id || !token) return showError();
            try {
                const res = await fetch(`/api/reply-info?id=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}`);
                if (!res.ok) return showError();
                const data = await res.json();
                document.getElementById('senderName').textContent = data.name;
                document.getElementById('metaLine').textContent = `From: ${data.name} <${data.email}>`;
                document.getElementById('originalMessage').textContent = data.message;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (e) {
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorPage').style.display = 'block';
        }

        async function sendReply() {
            const replyText = document.getElementById('replyText').value.trim();
            if (!replyText) return;
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, token, replyText })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('replyText').value = '';
                    btn.textContent = 'Sent';
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Failed to send. Please try again.';
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Send Reply';
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = 'Network error. Please try again.';
                document.getElementById('errorMsg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Reply';
            }
        }

        init();
    </script>
</body>
</html>
